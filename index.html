<!DOCTYPE html>
<html>
<head>
<title>E-Commerce App</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Simple E-Commerce Store</h1>

<div id="products">
  <div class="product">
    <h3>Mobile</h3>
    <p>₹10000</p>
    <button onclick="addToCart('Mobile',10000)">
      Add to Cart
    </button>
  </div>

  <div class="product">
    <h3>Laptop</h3>
    <p>₹50000</p>
    <button onclick="addToCart('Laptop',50000)">
      Add to Cart
    </button>
  </div>
</div>

<h2>Cart</h2>
<ul id="cart"></ul>

<h3>Total: ₹<span id="total">0</span></h3>

<script src="script.js"></script>

</body>
</html>
